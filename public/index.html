<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Speed Test</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="result-capture" id="result-capture">
        <section class="summary" aria-labelledby="page-title">
          <div>
            <h1 id="page-title">Speed Test</h1>
            <div class="identity-row" aria-label="Test context">
              <p class="identity-label">
                <svg class="identity-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9"></circle>
                  <path d="M3 12h18"></path>
                  <path d="M12 3a14 14 0 0 1 0 18"></path>
                  <path d="M12 3a14 14 0 0 0 0 18"></path>
                </svg>
                <span id="domain-label">-</span>
              </p>
              <p class="identity-label" id="network-chip" hidden>
                <svg class="identity-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="5" r="2.5"></circle>
                  <circle cx="5" cy="19" r="2.5"></circle>
                  <circle cx="19" cy="19" r="2.5"></circle>
                  <path d="M10.9 7.2 6.2 16.8"></path>
                  <path d="m13.1 7.2 4.7 9.6"></path>
                  <path d="M7.5 19h9"></path>
                </svg>
                <span id="network-label"></span>
              </p>
            </div>
          </div>
          <div class="actions capture-exclude">
            <button class="secondary-action" id="share-button" type="button" hidden>Share result</button>
            <button class="primary-action" id="run-button" type="button">Start Test</button>
          </div>
        </section>

        <section class="status-panel" id="status-panel" aria-live="polite">
          <div class="status-row">
            <span class="status-copy"><span class="status-icon" id="status-icon" aria-hidden="true"></span><span id="status-text">Ready</span></span>
            <span id="progress-label">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </section>

        <section class="metric-grid" aria-label="Speed test results">
          <article class="metric metric-large">
            <span>Download</span>
            <strong id="download-value">-</strong>
            <small>Mbps</small>
          </article>
          <article class="metric metric-large">
            <span>Upload</span>
            <strong id="upload-value">-</strong>
            <small>Mbps</small>
          </article>
          <article class="metric">
            <span>Latency</span>
            <strong id="latency-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Jitter</span>
            <strong id="jitter-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Download Latency</span>
            <strong id="download-latency-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Upload Latency</span>
            <strong id="upload-latency-value">-</strong>
            <small>ms</small>
          </article>
        </section>
      </div>

      <p class="footnote">
        <span>A full run may transfer around 200 MB of data.</span>
        <a href="https://github.com/ente-toys/speed-test/" rel="noreferrer" target="_blank">
          <span>Source code</span>
          <svg class="external-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 4h6v6"></path>
            <path d="m10 14 10-10"></path>
            <path d="M20 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5"></path>
          </svg>
        </a>
      </p>
    </main>

    <script type="module" src="/app.js?v=network-chip-20260603"></script>
  </body>
</html>

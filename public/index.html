<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Speed Test</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="result-capture" id="result-capture">
        <section class="summary" aria-labelledby="page-title">
          <div>
            <h1 id="page-title">Speed Test</h1>
            <p class="domain-label" id="domain-label">-</p>
          </div>
          <div class="actions capture-exclude">
            <button class="secondary-action" id="share-button" type="button" hidden>Share result</button>
            <button class="primary-action" id="run-button" type="button">Start Test</button>
          </div>
        </section>

        <section class="status-panel" id="status-panel" aria-live="polite">
          <div class="status-row">
            <span class="status-copy"><span class="status-icon" id="status-icon" aria-hidden="true"></span><span id="status-text">Ready</span></span>
            <span id="progress-label">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </section>

        <section class="metric-grid" aria-label="Speed test results">
          <article class="metric metric-large">
            <span>Download</span>
            <strong id="download-value">-</strong>
            <small>Mbps</small>
          </article>
          <article class="metric metric-large">
            <span>Upload</span>
            <strong id="upload-value">-</strong>
            <small>Mbps</small>
          </article>
          <article class="metric">
            <span>Latency</span>
            <strong id="latency-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Jitter</span>
            <strong id="jitter-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Download Latency</span>
            <strong id="download-latency-value">-</strong>
            <small>ms</small>
          </article>
          <article class="metric">
            <span>Upload Latency</span>
            <strong id="upload-latency-value">-</strong>
            <small>ms</small>
          </article>
        </section>
      </div>

      <p class="footnote">A full run may transfer around 200 MB of data.</p>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
